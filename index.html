<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camisa 9 | Streetwear de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9d4edd; /* Roxo vibrante estilo Bezutts */
            --accent: #ff0054;  /* Cor de destaque para ofertas */
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top, #121212 0%, #000000 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        
        .logo-area {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            margin-bottom: 15px;
            box-shadow: 0 0 15px var(--primary);
        }

        h1 { font-weight: 900; text-transform: uppercase; margin: 0; font-size: 1.6rem; letter-spacing: 2px; }
        
        .announcement {
            background: var(--accent);
            color: white;
            font-size: 0.65rem;
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
            display: inline-block;
        }

        .links-container { width: 100%; max-width: 380px; margin-top: 20px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 18px;
            margin-bottom: 12px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.02);
        }

        /* Destaque para o Catálogo */
        .btn-featured {
            border: 2px solid var(--primary);
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.2);
        }

        /* Efeito pulsação no WhatsApp */
        .btn-whatsapp {
            background: #25d366;
            color: white;
            border: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .footer { margin-top: 40px; font-size: 0.8rem; color: #444; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <img src="SUhttps://www.instagram.com/p/DXCVmiukbvc/A_LOGO_AQUI" class="logo-area" alt="Logo">
        <h1>CAMISA 9 👑</h1>
        <div class="announcement">🚚 Frete Grátis para todo Brasil</div>
    </div>

    <div class="links-container">
        <a href="https://drive.google.com/file/d/1KR-69rfDmCqhBfBc0zlrIJg6Xdw3M9r3/view?usp=sharing" class="btn btn-featured">🔥 CATÁLOGO LANÇAMENTOS 26/27</a>
        <a href="https://wa.me/5521979604258" class="btn btn-whatsapp">📲 FAZER PEDIDO (WhatsApp)</a>
        <a href="https://www.instagram.com/camisa9.street" class="btn">📸 INSTAGRAM OFICIAL</a>
        <a href="#" class="btn">📏 TABELA DE MEDIDAS</a>
    </div>

    <div class="footer">CAMISA 9 • STREETWEAR CONCEPT</div>

</body>
</html>
